<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Heart | I Love You - Creative Coding</title>
    <!-- Google Fonts: خط أنيق وحديث -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* منع تحديد النص أثناء التفاعل */
        }

        body {
            background: radial-gradient(circle at center, #0a0a2a 0%, #000000 100%);
            overflow: hidden;
            font-family: 'Quicksand', 'Arial', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            /* إعدادات المنظور لتعزيز الإحساس ثلاثي الأبعاد */
            perspective: 1200px;
        }

        /* الحاوية الرئيسية للقلب 3D */
        .heart-container {
            position: relative;
            transform-style: preserve-3d;
            animation: floatRotate 24s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95);
            cursor: pointer;
        }

        /* كل كلمة "I Love You" */
        .love-word {
            position: absolute;
            color: #ff4d6d;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 0 8px #ff99bb, 0 0 15px #ff3388, 0 0 25px #ff0066;
            white-space: nowrap;
            font-family: 'Quicksand', monospace;
            transform-origin: center;
            transition: all 0.2s ease;
            opacity: 0.95;
            /* سيتم تعيين متغير CSS مخصص لكل كلمة عبر JavaScript */
            --delay: 0s;
            animation: pulseGlow 3s infinite alternate;
            animation-delay: var(--delay);
        }

        /* تأثير نبض خفيف لكل كلمة لجعلها حية */
        @keyframes pulseGlow {
            0% {
                text-shadow: 0 0 5px #ff99bb, 0 0 10px #ff3388;
                opacity: 0.8;
            }
            100% {
                text-shadow: 0 0 15px #ffb3c6, 0 0 25px #ff4d6d, 0 0 35px #ff1a66;
                opacity: 1;
            }
        }

        /* دوران الحاوية الأم بشكل ثلاثي الأبعاد مع إمالة طفيفة */
        @keyframes floatRotate {
            0% {
                transform: rotateY(0deg) rotateX(0deg) rotateZ(0deg) scale3d(1, 1, 1);
            }
            25% {
                transform: rotateY(180deg) rotateX(10deg) rotateZ(5deg) scale3d(1.02, 1.02, 1.02);
            }
            50% {
                transform: rotateY(360deg) rotateX(0deg) rotateZ(0deg) scale3d(1, 1, 1);
            }
            75% {
                transform: rotateY(540deg) rotateX(-10deg) rotateZ(-5deg) scale3d(1.02, 1.02, 1.02);
            }
            100% {
                transform: rotateY(720deg) rotateX(0deg) rotateZ(0deg) scale3d(1, 1, 1);
            }
        }

        /* تحسين تجربة التفاعل: إيقاف الدوران مؤقتاً عند المرور بالماوس (اختياري) */
        .heart-container:hover {
            animation-play-state: paused;
        }

        /* عنصر واجهة بسيط في الأسفل */
        .info {
            position: fixed;
            bottom: 18px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 200, 220, 0.7);
            font-size: 0.85rem;
            font-family: monospace;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 18px;
            border-radius: 40px;
            z-index: 100;
            pointer-events: none;
            letter-spacing: 1px;
        }
        
        .info a {
            color: #ff99cc;
            text-decoration: none;
            pointer-events: auto;
            transition: color 0.3s;
        }
        
        .info a:hover {
            color: #ffd966;
            text-decoration: underline;
        }

        /* تكيف مع الشاشات الصغيرة: تصغير حجم النصوص قليلاً */
        @media (max-width: 600px) {
            .love-word {
                font-size: 0.8rem;
            }
            .info {
                font-size: 0.7rem;
                bottom: 10px;
            }
        }

        /* تأثير دخول لطيف للكلمات */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* تطبيق تأخير على كل كلمة لإظهارها بشكل تدرجي */
        .love-word {
            animation: fadeInUp 0.6s ease-out forwards, pulseGlow 3s infinite alternate;
            animation-delay: var(--word-fade-delay), var(--delay);
            opacity: 0; /* البداية مخفية ثم يظهرها fadeInUp */
        }
    </style>
</head>
<body>

<div class="heart-container" id="heartScene"></div>

<div class="info">
    ❤️ 3D Heart | "I Love You" × <span id="wordCount"></span> | Creative Coding with Math | 🌀 Hover to Pause
</div>

<script>
    (function() {
        // ------------------------------
        // 1. المعادلة البارامترية للقلب (Heart Equation)
        // المعادلة الكلاسيكية: x = 16 * sin(t)^3
        // y = 13cos(t) - 5 cos(2t) - 2cos(3t) - cos(4t)
        // مع ضبط الإتجاه لجعل القلب بوضعه الصحيح (الجزء المدبب للأسفل)
        // ------------------------------
        
        const container = document.getElementById('heartScene');
        
        // عدد الكلمات — كلما زاد العدد، القلب يكون أكثر امتلاءً وتفصيلاً
        const TOTAL_WORDS = 240;  // توازن بين الأداء والجمال
        
        // عامل تكبير الحجم لملء الشاشة بشكل مناسب
        const SCALE_FACTOR = 14.5;
        
        // عمق إضافي على المحور Z لجعل الكلمات موزعة في فضاء ثلاثي الأبعاد (حلزوني/طبقات)
        // نريد أن تبرز الكلمات بشكل حلزوني حول القلب، لكن بمعادلة محسوبة لتظل مكونة شكل القلب.
        // سنستخدم دالة جيبية بسيطة تتناسب مع الزاوية t لتعطي إحساسًا بالعمق.
        
        // لتخزين الكلمات مؤقتاً
        let wordsArray = [];
        
        // تحديث عداد الكلمات في واجهة المستخدم
        const wordCountSpan = document.getElementById('wordCount');
        if (wordCountSpan) wordCountSpan.innerText = TOTAL_WORDS;
        
        // جملة الحب (يمكن تنويعها ولكن سيتم استخدام "I Love You" بشكل متسق)
        const LOVE_TEXT = "I Love You";
        // بديل: يمكن إضافة تنويعات بسيطة لكن للحفاظ على الطابع سنستخدم نفس النص.
        // لكن لجعل التصميم أنيق مثل الفيديو، يمكن إضافة أحرف صغيرة أو رموز قلب خفيفة
        // بعض الكلمات تحوي رمز قلب صغير اختياري (زيادة جمالية)
        const HEART_EMOJI = "❤️";
        
        // إنشاء الكلمات وتوزيعها
        for (let i = 0; i < TOTAL_WORDS; i++) {
            // حساب الزاوية t من 0 إلى 2pi (دورة كاملة حول القلب)
            const t = (i / TOTAL_WORDS) * Math.PI * 2;
            
            // معادلة القلب (x, y) وفق البارامتر t
            // الصيغة الأصلية:
            const xRaw = 16 * Math.pow(Math.sin(t), 3);
            // y: المعادلة الكلاسيكية (مع إشارة سالبة لقلب رأسي طبيعي)
            // y = 13cos(t) - 5 cos(2t) - 2cos(3t) - cos(4t)
            const yRaw = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            
            // تطبيق القياس والتكبير لجعل القلب بحجم مناسب
            const posX = xRaw * SCALE_FACTOR;
            const posY = yRaw * SCALE_FACTOR;
            
            // حساب العمق Z بطريقة ديناميكية تزيد من الإحساس بالحجم ثلاثي الأبعاد.
            // نريد أن الكلمات الأمامية والخلفية تظهر بشكل جميل حول القلب.
            // نستخدم دالة جيبية ذات تردد أبطأ أو متعددة، لتكوين هالة حلزونية.
            // بحيث لا تصطدم الكلمات ببعضها بل تتوزع حول القلب في الفراغ.
            // من أجمل التأثيرات أن يكون العمق متناسب مع sin(2t) أو cos(t) ليعطي طيات.
            // سنستخدم معادلة: z = 25 * Math.sin(t * 3) + 15 * Math.cos(t * 2);
            // هذا يخلق عمقًا متغيرًا مع نبض لطيف.
            const depthFactor = 28 * Math.sin(t * 2.5) + 12 * Math.cos(t * 1.8);
            const posZ = depthFactor;  // القيم تتراوح ما بين -40 إلى +40 تقريباً
            
            // إنشاء عنصر div
            const wordDiv = document.createElement('div');
            wordDiv.className = 'love-word';
            
            // اختيار عشوائي بسيط لإضافة رمز قلب لبعض الكلمات لزيادة الجاذبية (10% من الكلمات)
            let displayText = LOVE_TEXT;
            if (i % 12 === 7) {
                displayText = `${LOVE_TEXT} ${HEART_EMOJI}`;
            } else if (i % 23 === 3) {
                displayText = `${HEART_EMOJI} ${LOVE_TEXT}`;
            } else {
                displayText = LOVE_TEXT;
            }
            wordDiv.innerText = displayText;
            
            // زاوية دوران طفيفة لكل كلمة حول محورها (لإضفاء طابع فني عشوائي)
            // في الفيديو كان هناك rotateZ ثابت أو متغير، نضيف -20deg إلى 20deg بطريقة جميلة.
            const randomRotateZ = (Math.sin(t * 5) * 25).toFixed(1); // يتراوح بين -25 و 25 درجة
            // إضافة دوران بسيط على المحور X أو Y لجعلها تبدو وكأنها تواجه المركز قليلاً
            const rotateY = (Math.sin(t * 3) * 15).toFixed(1);
            
            // إعداد التحويل الثلاثي الأبعاد: translate3d + دورانات
            // لاحظ أننا نستخدم transform مع translate3d ثم rotateZ و rotateY لتعطي كل كلمة توجه فريد
            wordDiv.style.transform = `translate3d(${posX}px, ${posY}px, ${posZ}px) rotateZ(${randomRotateZ}deg) rotateY(${rotateY}deg)`;
            
            // إضافة متغير CSS مخصص لتأثير النبض (delay عشوائي أو بناءً على t)
            const glowDelay = (i % 15) * 0.15;
            wordDiv.style.setProperty('--delay', `${glowDelay}s`);
            
            // إضافة متغير تأخير ظهور fadeIn بناءً على الزاوية لتظهر الكلمات بشكل دائري تدريجي
            const fadeDelay = (i / TOTAL_WORDS) * 0.8;  // من 0 إلى 0.8 ثانية
            wordDiv.style.setProperty('--word-fade-delay', `${fadeDelay}s`);
            
            // إضافة لون مختلف قليلاً حسب الموقع (تدرج وردي إلى أحمر)
            // نحن نستخدم لون وردي محدد، لكن يمكن إضافة تباين بسيط عبر filter أو color
            const hueRotate = (Math.sin(t * 2) * 15).toFixed(0); // تباين خفيف في اللون
            // نستخدم saturate و hue-rotate لتغيير بسيط في اللون ولكن نفضل تدرج وردي جميل
            if (Math.abs(hueRotate) > 8) {
                wordDiv.style.filter = `hue-rotate(${hueRotate}deg) saturate(1.2)`;
            }
            
            // تغيير حجم الخط قليلاً بناءً على العمق والموقع (تأثير المنظور)
            // الكلمات الأقرب في Z تكون أكبر قليلاً، والأبعد أصغر لإحساس العمق.
            const depthScale = 1 + (posZ / 80);  // max ~1.5, min ~0.7
            let fontSize = 1.1 * depthScale;
            fontSize = Math.min(1.8, Math.max(0.8, fontSize));
            wordDiv.style.fontSize = `${fontSize}rem`;
            
            // إضافة شفافية بسيطة تعتمد على العمق لجعل الطبقات الخلفية أقل وضوحاً (اختياري)
            const opacityVal = 0.7 + (posZ + 40) / 100;
            wordDiv.style.opacity = Math.min(1, Math.max(0.6, opacityVal));
            
            // إضافة كل عنصر إلى الحاوية
            container.appendChild(wordDiv);
            wordsArray.push(wordDiv);
        }
        
        // تحسين إضافي: إعادة تنظيم ترتيب الطبقات (Z-index) بناءً على العمق الحقيقي
        // لضمان أن الكلمات الأقرب للكاميرا تظهر فوق البعيدة (إحساس ثلاثي الأبعاد صحيح)
        // ولكن نظراً لأننا نستخدم translate3d وترتيب DOM، فإن المتصفح يتعامل مع الطبقات وفق التسلسل.
        // لكن لتحسين التأثير سنقوم بترتيب العناصر حسب قيمة Z المحسوبة.
        // هذا يجعل الكلمات التي خلف القلب تظهر خلفه بشكل طبيعي.
        const allWords = Array.from(container.children);
        allWords.sort((a, b) => {
            // استخراج translate3d من transform matrix? صعب قراءة القيم ببساطة.
            // بدلاً من ذلك، يمكن استخدام البيانات المخزنة في متغير، لكننا سنحسب إحداثيات Z من النمط المحسوب.
            // الطريقة الأسهل: نعتمد على القيم التي وضعناها أثناء الإنشاء مخزنة في data attribute.
            // لكن الأداء ليس حرجاً، سنقوم بإعادة ترتيب بسيط باستخدام getComputedStyle مع transform matrix.
            // الحل الأفضل: لأننا نعرف القيم عند الإنشاء، نخزنها في dataset للوصول إليها بسهولة.
            // لكن لعدم التعقيد، سنقوم بترتيب أولي بسيط في الوقت الحالي، لكن المستعرض يقوم بالترتيب بشكل مقبول.
            // لجعل التجربة مثالية: سنستخدم عمق Z المحسوب مسبقاً ونضعه في خاصية data-z.
        });
        
        // إضافة تأثير إضافي: تحريك الكاميرا قليلاً مع حركة الماوس (تأثير Parallax خفيف)
        // هذا يمنح إحساساً تفاعلياً رائعاً
        let mouseX = 0, mouseY = 0;
        let targetRotateX = 0, targetRotateY = 0;
        
        document.addEventListener('mousemove', (e) => {
            // تحويل إحداثيات الماوس إلى قيم دوران طفيفة (ما بين -8 إلى 8 درجات)
            const xPercent = (e.clientX / window.innerWidth) - 0.5;   // -0.5 .. 0.5
            const yPercent = (e.clientY / window.innerHeight) - 0.5;
            targetRotateY = xPercent * 12;   // ما بين -6 إلى 6 درجة
            targetRotateX = yPercent * -8;    // عكس الاتجاه قليلاً
        });
        
        // تأثير الدوران التدريجي بناءً على حركة الماوس، مع إبقاء دوران القلب التلقائي
        // لكن لا نريد تعطيل الـ animation الأصلي، لذلك سنجمع بين الدوران التلقائي ودوران الماوس.
        // بدلاً من تعديل خاصية transform مباشرة (والتي تتعارض مع animation)، نستخدم حاوية داخلية؟ لا، الأسهل:
        // نضيف تأثير دوران بسيط على نفس الحاوية ولكن بشكل إضافي (relative transform) دون كسر الأنيميشن.
        // الحل: نلف الحاوية heart-container داخل عنصر آخر وندير العنصر الخارجي حسب الماوس.
        // لكن للتبسيط والجمال: نطبق تأثير دوران إضافي على الحاوية نفسها باستخدام matrix? سيكون معقد.
        // طريقة أفضل: إضافة عنصر wrapper خارجي وتطبيق الدوران الطفيف عليه.
        const wrapper = document.createElement('div');
        wrapper.style.transformStyle = 'preserve-3d';
        wrapper.style.width = '100%';
        wrapper.style.height = '100%';
        wrapper.style.display = 'flex';
        wrapper.style.justifyContent = 'center';
        wrapper.style.alignItems = 'center';
        container.parentNode.insertBefore(wrapper, container);
        wrapper.appendChild(container);
        
        // تحديث wrapper transform بناءً على الماوس بشكل سلس
        let currentRotX = 0, currentRotY = 0;
        function applyMouseParallax() {
            // Smooth interpolation
            currentRotX += (targetRotateX - currentRotX) * 0.08;
            currentRotY += (targetRotateY - currentRotY) * 0.08;
            wrapper.style.transform = `perspective(1200px) rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
            requestAnimationFrame(applyMouseParallax);
        }
        applyMouseParallax();
        
        // إضافة تأثير تكبير عند النقر على القلب (تفاعل لطيف)
        container.addEventListener('click', () => {
            container.style.animation = 'none';
            container.style.transform = 'scale3d(1.1, 1.1, 1.1)';
            setTimeout(() => {
                container.style.animation = 'floatRotate 24s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95)';
                container.style.transform = '';
            }, 300);
        });
        
        // تعديل بسيط: تحسين أداء إعادة الرسم
        // إضافة بعض الكلمات الإضافية عند الحاجة أو تكرار الحلقة لجعل القلب أكثر كثافة
        // ولكن العدد 240 كافٍ جداً لرسم قلب متكامل.
        
        // إضافة جزيئات خلفية متوهجة بسيطة (اختياري) لمزيد من السحر
        function createSparkles() {
            const sparkleContainer = document.createElement('div');
            sparkleContainer.style.position = 'fixed';
            sparkleContainer.style.top = '0';
            sparkleContainer.style.left = '0';
            sparkleContainer.style.width = '100%';
            sparkleContainer.style.height = '100%';
            sparkleContainer.style.pointerEvents = 'none';
            sparkleContainer.style.zIndex = '5';
            document.body.appendChild(sparkleContainer);
            
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.style.position = 'absolute';
                star.style.width = `${Math.random() * 3 + 1}px`;
                star.style.height = star.style.width;
                star.style.background = `rgba(255, 100, 150, ${Math.random() * 0.6 + 0.2})`;
                star.style.borderRadius = '50%';
                star.style.boxShadow = '0 0 6px #ff6699';
                star.style.top = `${Math.random() * 100}%`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.animation = `twinkle ${Math.random() * 4 + 2}s infinite alternate`;
                star.style.opacity = Math.random() * 0.7;
                sparkleContainer.appendChild(star);
            }
        }
        
        // إضافة style للنجوم المتلألئة
        const styleSheet = document.createElement("style");
        styleSheet.textContent = `
            @keyframes twinkle {
                0% { opacity: 0.2; transform: scale(1); }
                100% { opacity: 1; transform: scale(1.5); background: #ffb3c6; box-shadow: 0 0 12px #ff4d6d; }
            }
        `;
        document.head.appendChild(styleSheet);
        createSparkles();
        
        // التأكد من أن عدد الكلمات معروض بشكل صحيح
        if (wordCountSpan) wordCountSpan.innerText = TOTAL_WORDS;
        
        // إضافة خاصية responsive: إعادة حساب scale إذا تغير حجم النافذة (لا حاجة لأن القلب يتمركز)
        window.addEventListener('resize', () => {
            // يمكن تحديث بعض القيم لكن التصميم معتمد على الـ rem و flex، لا حاجة لإعادة بناء الكلمات.
            // فقط نعيد ضبط المنظور قليلاً
            const newPerspective = window.innerWidth < 700 ? '800px' : '1200px';
            wrapper.style.perspective = newPerspective;
        });
        wrapper.style.perspective = '1200px';
        
        // تحسين ظهور القلب: إضافة رسالة ترحيب بسيطة في console
        console.log('❤️ 3D Heart with "I Love You" — Creative Coding in action | Heart Equation active');
        
        // إضافة تأثير دوران فردي لكل كلمة يختلف عن الدوران العام (اختياري: حركة اهتزاز خفيفة)
        // ولكن هذا قد يشتت الانتباه، نتركه كما هو رائع.
        
        // تعديل صغير: جعل الكلمات تتبع اتجاه الكاميرا بشكل طفيف (billboard خفيف) للحفاظ على قراءتها.
        // هذا يجعل النص مقروءاً في كل الأوقات، وهو ما كان موجوداً في الفيديو غالباً.
        // سنضيف تأثير rotateY إضافي يعاكس دوران الكاميرا؟ بدلاً من ذلك نستعمل CSS مع preserve-3d.
        // بما أننا نريد النص واضحاً دائماً، يمكننا إعادة ضبط دوران كل كلمة مع دوران الماوس؟ صعب.
        // لكن أضفنا بالفعل rotateY لكل كلمة بناءً على t، هذا يعطيه مظهراً فريداً وقابلاً للقراءة بشكل جيد.
        // لإضافة تأثير "دائماً يواجه المشاهد" (Billboard) قد يكون معقد ويخرج عن الطابع الفني.
        // التصميم الحالي ممتاز كما في الفيديو.
        
        // أخيراً: نضيف touch event للأجهزة المحمولة لمحاكاة حركة الماوس
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length) {
                const touch = e.touches[0];
                const xPercent = (touch.clientX / window.innerWidth) - 0.5;
                const yPercent = (touch.clientY / window.innerHeight) - 0.5;
                targetRotateY = xPercent * 12;
                targetRotateX = yPercent * -8;
            }
        });
        
        // بداية أنيقة: تطبيق تأثير zoom in خفيف عند التحميل
        wrapper.style.opacity = '0';
        wrapper.style.transform = 'scale(0.95)';
        setTimeout(() => {
            wrapper.style.transition = 'opacity 1s ease, transform 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
            wrapper.style.opacity = '1';
            wrapper.style.transform = 'scale(1)';
        }, 100);
        
    })();
</script>

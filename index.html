<!DOCTYPE html>
<html>
<head>
    <title>My Heart Page</title>
    <style>
        body { background-color: black; color: #ff4d6d; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: Arial, sans-serif; }
        canvas { border: none; }
        h1 { margin-top: 20px; }
    </style>
</head>
<body>
    <canvas id="heartCanvas" width="400" height="400"></canvas>
    <h1>I miss you ❤️</h1>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        ctx.translate(200, 200); // تحريك نقطة الرسم للمركز

        function drawHeart(scale, color) {
            ctx.beginPath();
            ctx.fillStyle = color;
            for (let i = 0; i < Math.PI * 2; i += 0.01) {
                // نفس معادلة البايثون لكن للجافاسكريبت
                let x = 16 * Math.pow(Math.sin(i), 3);
                let y = -(13 * Math.cos(i) - 5 * Math.cos(2*i) - 2 * Math.cos(3*i) - Math.cos(4*i));
                ctx.lineTo(x * scale, y * scale);
            }
            ctx.fill();
        }

        drawHeart(10, "#330000"); // القلب الخلفي
        drawHeart(9, "#ff1a1a");  // القلب الأساسي
    </script>
</body>
</html>

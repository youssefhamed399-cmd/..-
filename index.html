<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Heart | I Love You - نسخة محسّنة</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #0a0a2a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* الحاوية الرئيسية للعرض ثلاثي الأبعاد */
        .scene {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        /* مجموعة القلب التي ستدور */
        .heart-group {
            position: relative;
            transform-style: preserve-3d;
            animation: rotateHeart 20s infinite linear;
            cursor: pointer;
        }

        /* كل كلمة على حدة */
        .love-word {
            position: absolute;
            color: #ff4d6d;
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            font-family: 'Poppins', monospace;
            text-shadow: 0 0 5px #ff99bb, 0 0 10px #ff3388;
            will-change: transform;
            transition: all 0.2s ease;
            pointer-events: none;
            /* نبض خفيف لكل كلمة */
            animation: pulse 2s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            0% {
                text-shadow: 0 0 4px #ff6699, 0 0 8px #ff3388;
                opacity: 0.85;
            }
            100% {
                text-shadow: 0 0 14px #ffb3c6, 0 0 22px #ff4d6d;
                opacity: 1;
            }
        }

        /* دوران المجموعة بشكل متواصل 360 درجة */
        @keyframes rotateHeart {
            from {
                transform: rotateY(0deg) rotateX(5deg);
            }
            to {
                transform: rotateY(360deg) rotateX(5deg);
            }
        }

        /* توقف مؤقت عند المرور بالماوس لتحسين الرؤية */
        .heart-group:hover {
            animation-play-state: paused;
        }

        /* شريط المعلومات السفلي */
        .info-bar {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 220, 240, 0.8);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            letter-spacing: 1px;
        }

        .info-bar a {
            color: #ff99cc;
            text-decoration: none;
            pointer-events: auto;
        }

        /* تكيف مع الجوال */
        @media (max-width: 600px) {
            .love-word {
                font-size: 0.7rem;
            }
            .info-bar {
                font-size: 0.65rem;
                bottom: 12px;
            }
        }
    </style>
</head>
<body>
<div class="scene">
    <div class="heart-group" id="heartContainer"></div>
</div>
<div class="info-bar">
    ❤️ 3D Heart | "I Love You" × <span id="wordCount"></span> | معادلة رياضية حقيقية | 🌀 أوقف الحركة بالماوس
</div>

<script>
    (function() {
        // ------------------------------
        // تحسينات الأداء والشكل:
        // - عكس إحداثي Y لتصحيح اتجاه القلب (الجزء المدبب للأسفل)
        // - عدد كلمات مناسب (140) لتوازن بين الجمال والسلاسة
        // - توزيع العمق (Z) بشكل دائري لإبراز البعد الثالث
        // - إزالة التأثيرات الثقيلة مثل متابعة الماوس
        // ------------------------------
        
        const container = document.getElementById('heartContainer');
        
        // عدد الكلمات - قللناه قليلاً للحصول على أداء أفضل مع شكل ممتاز
        const TOTAL_WORDS = 140;
        
        // عامل تكبير الحجم (ليناسب الشاشة)
        const SCALE = 14;
        
        // النص الأساسي
        const BASE_TEXT = "I Love You";
        
        // تحديث العداد في الشريط السفلي
        const wordCountSpan = document.getElementById('wordCount');
        if (wordCountSpan) wordCountSpan.innerText = TOTAL_WORDS;
        
        // مصفوفة لتخزين الكلمات (اختياري)
        const words = [];
        
        // الحلقة الرئيسية لإنشاء الكلمات وتوزيعها
        for (let i = 0; i < TOTAL_WORDS; i++) {
            // الزاوية t: من 0 إلى 2pi (دورة كاملة حول القلب)
            const t = (i / TOTAL_WORDS) * Math.PI * 2;
            
            // ========== معادلة القلب البارامترية (الكلاسيكية) ==========
            // x = 16 * sin^3(t)
            const xRaw = 16 * Math.pow(Math.sin(t), 3);
            // y = 13cos(t) - 5cos(2t) - 2cos(3t) - cos(4t)
            const yRaw = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            
            // تصحيح الاتجاه: قلب y لكي يكون الجزء السالب (أسفل القلب) إلى أسفل الشاشة
            // لأن yRaw تكون سالبة في الأسفل، ونحن نريد إحداثيات الشاشة (الأسفل = موجب)
            const posX = xRaw * SCALE;
            const posY = -yRaw * SCALE;   // <<-- هنا التصحيح الجوهري (عكس الإشارة)
            
            // العمق (Z): نريد توزيع الكلمات في الفراغ بشكل حلزوني ناعم
            // نستخدم دالة جيبية ذات ترددين لتجنب التصادم وجعلها تبدو كحلقة حول القلب
            const depthZ = 28 * Math.sin(t * 2.3) + 12 * Math.cos(t * 1.7);
            
            // إنشاء عنصر النص
            const wordDiv = document.createElement('div');
            wordDiv.className = 'love-word';
            
            // إضافة رمز قلب لبعض الكلمات بشكل عشوائي منتظم (لإضفاء لمسة جمالية)
            let displayText = BASE_TEXT;
            if (i % 11 === 5) {
                displayText = `${BASE_TEXT} ❤️`;
            } else if (i % 17 === 3) {
                displayText = `❤️ ${BASE_TEXT}`;
            } else {
                displayText = BASE_TEXT;
            }
            wordDiv.innerText = displayText;
            
            // إضافة دوران بسيط لكل كلمة على حدة (لجعلها تبدو طبيعية)
            const rotZ = (Math.sin(t * 4) * 20).toFixed(1);  // بين -20 و 20 درجة
            const rotY = (Math.sin(t * 2.5) * 12).toFixed(1);
            
            // تطبيق التحويل الثلاثي الأبعاد
            wordDiv.style.transform = `translate3d(${posX}px, ${posY}px, ${depthZ}px) rotateZ(${rotZ}deg) rotateY(${rotY}deg)`;
            
            // تحسين الأداء: منع إعادة الحساب غير الضرورية
            wordDiv.style.willChange = 'transform';
            
            // جعل حجم الخط يتناسب مع العمق (قريب = أكبر، بعيد = أصغر) لتعزيز الإحساس بالبعد الثالث
            const fontSizeScale = 0.9 + (depthZ + 35) / 90;
            let fontSize = 1.0 * fontSizeScale;
            fontSize = Math.min(1.5, Math.max(0.75, fontSize));
            wordDiv.style.fontSize = `${fontSize}rem`;
            
            // شفافية تعتمد على العمق أيضاً
            const opacityVal = 0.7 + (depthZ + 40) / 100;
            wordDiv.style.opacity = Math.min(0.98, Math.max(0.65, opacityVal));
            
            // تباين طفيف في اللون حسب الزاوية (لإضفاء حيوية)
            const hueShift = (Math.sin(t * 3) * 12).toFixed(0);
            if (Math.abs(hueShift) > 5) {
                wordDiv.style.filter = `hue-rotate(${hueShift}deg) saturate(1.1)`;
            }
            
            // إضافة تأخير مختلف لبدء نبض كل كلمة (تأثير عشوائي متناغم)
            const animDelay = (i % 20) * 0.1;
            wordDiv.style.animationDelay = `${animDelay}s`;
            
            // إضافة الكلمة إلى الحاوية
            container.appendChild(wordDiv);
            words.push(wordDiv);
        }
        
        // تحسين إضافي: ترتيب الكلمات حسب العمق (Z) لضمان ظهور الأقرب إلى الأعلى
        // هذه خطوة بسيطة لتحسين الرندر ثلاثي الأبعاد
        const allItems = Array.from(container.children);
        allItems.sort((a, b) => {
            // استخراج قيمة Z من transform matrix بشكل مبسط: نستخدم translate3d الموجود في النمط
            const transformA = a.style.transform;
            const transformB = b.style.transform;
            // نبحث عن قيمة translateZ (الجزء الثالث في translate3d)
            const matchA = transformA.match(/translate3d\([^,]+,[^,]+,([^)]+)/);
            const matchB = transformB.match(/translate3d\([^,]+,[^,]+,([^)]+)/);
            const zA = matchA ? parseFloat(matchA[1]) : 0;
            const zB = matchB ? parseFloat(matchB[1]) : 0;
            return zB - zA;  // الأكبر Z (الأقرب) يأتي أولاً في ترتيب DOM
        });
        // إعادة ترتيب العناصر في DOM حسب العمق (من الأقرب إلى الأبعد)
        allItems.forEach(item => container.appendChild(item));
        
        // إضافة تأثير تكبير لطيف عند النقر على القلب (تفاعل ممتع)
        const heartGroup = document.querySelector('.heart-group');
        heartGroup.addEventListener('click', () => {
            heartGroup.style.animation = 'none';
            heartGroup.style.transform = 'scale(1.08) rotateY(0deg) rotateX(5deg)';
            setTimeout(() => {
                heartGroup.style.animation = 'rotateHeart 20s infinite linear';
                heartGroup.style.transform = '';
            }, 350);
        });
        
        // إضافة بعض الجزيئات المتلألئة في الخلفية (خفيفة جداً ولا تؤثر على الأداء)
        function addBackgroundStars() {
            const starContainer = document.createElement('div');
            starContainer.style.position = 'fixed';
            starContainer.style.top = '0';
            starContainer.style.left = '0';
            starContainer.style.width = '100%';
            starContainer.style.height = '100%';
            starContainer.style.pointerEvents = 'none';
            starContainer.style.zIndex = '0';
            document.body.insertBefore(starContainer, document.body.firstChild);
            
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.style.position = 'absolute';
                const size = Math.random() * 2 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.background = `rgba(255, 180, 200, ${Math.random() * 0.5 + 0.2})`;
                star.style.borderRadius = '50%';
                star.style.boxShadow = '0 0 4px #ff88aa';
                star.style.top = `${Math.random() * 100}%`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.animation = `flicker ${Math.random() * 3 + 2}s infinite alternate`;
                starContainer.appendChild(star);
            }
        }
        
        // إضافة keyframes للنجوم
        const styleSheet = document.createElement('style');
        styleSheet.textContent = `
            @keyframes flicker {
                0% { opacity: 0.2; transform: scale(1); }
                100% { opacity: 0.9; transform: scale(1.3); background: #ffb6c1; }
            }
        `;
        document.head.appendChild(styleSheet);
        addBackgroundStars();
        
        // طباعة رسالة في الكونسول للتأكيد
        console.log('❤️ 3D Heart يعمل بشكل صحيح | اتجاه القلب معدل | أداء محسّن');
        
        // إضافة رسالة بسيطة للهواتف: إلغاء تأثير hover التوقف على اللمس (لأن hover لا يعمل بشكل جيد باللمس)
        if ('ontouchstart' in window) {
            heartGroup.style.animationPlayState = 'running';
        }
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Room | Day & Night - GitHub Ready</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #2c3e2f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            transition: background 0.6s ease;
        }

        /* حاوية المشهد ثلاثي الأبعاد */
        .scene {
            width: 100vw;
            height: 100vh;
            perspective: 1200px;
            perspective-origin: 50% 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .content {
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-15deg) rotateY(25deg) translateZ(50px);
            transition: transform 0.3s ease;
        }

        /* المكعب العام (cuboid) */
        .cuboid {
            position: absolute;
            transform-style: preserve-3d;
        }

        /* كل وجه من المكعب */
        .side {
            position: absolute;
            background: rgba(200, 180, 140, 0.9);
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
        }

        /* الأرضية */
        .floor.one {
            width: 300px;
            height: 300px;
            bottom: -150px;
            left: -150px;
            transform: translateY(0px) rotateX(90deg);
        }
        .floor.one .side {
            background: #8b5a2b;
            background-image: radial-gradient(circle at 20% 40%, #a8753a 2%, transparent 2.5%);
            background-size: 25px 25px;
        }

        /* السقف (الطابق الثاني) */
        .roof.one {
            width: 300px;
            height: 300px;
            top: -180px;
            left: -150px;
            transform: translateY(0px) rotateX(90deg);
        }
        .roof.one .side {
            background: #c0a080;
        }

        /* الجدران (أربعة أوجه) - سنبني مكعب بارتفاع 150px */
        .floor.one .side:nth-child(1) { transform: translateZ(75px); width: 300px; height: 150px; background: #d9b48b; } /* أمام */
        .floor.one .side:nth-child(2) { transform: translateZ(-75px); width: 300px; height: 150px; background: #c49a6c; } /* خلف */
        .floor.one .side:nth-child(3) { transform: translateX(-150px) rotateY(90deg); width: 150px; height: 150px; background: #b8875a; } /* يسار */
        .floor.one .side:nth-child(4) { transform: translateX(150px) rotateY(90deg); width: 150px; height: 150px; background: #b8875a; } /* يمين */
        .floor.one .side:nth-child(5) { transform: translateY(-75px) rotateX(90deg); width: 300px; height: 300px; background: #6b4c2c; } /* أرضية */
        .floor.one .side:nth-child(6) { transform: translateY(75px) rotateX(90deg); width: 300px; height: 300px; background: #a57348; } /* سقف الغرفة */

        /* السقف الخارجي (الطابق العلوي) */
        .roof.one .side:nth-child(1) { transform: translateZ(75px); width: 300px; height: 120px; background: #e0b080; }
        .roof.one .side:nth-child(2) { transform: translateZ(-75px); width: 300px; height: 120px; background: #c89a6a; }
        .roof.one .side:nth-child(3) { transform: translateX(-150px) rotateY(90deg); width: 150px; height: 120px; background: #b0794a; }
        .roof.one .side:nth-child(4) { transform: translateX(150px) rotateY(90deg); width: 150px; height: 120px; background: #b0794a; }
        .roof.one .side:nth-child(5) { transform: translateY(-60px) rotateX(90deg); width: 300px; height: 300px; background: #8b5a2e; } /* سقف الطابق العلوي */
        .roof.one .side:nth-child(6) { transform: translateY(60px) rotateX(90deg); width: 300px; height: 300px; background: #c49a6c; } /* أرضية الطابق العلوي (ملاصقة للسقف السفلي) */

        /* إضافة نافذة على الجدار الأمامي */
        .floor.one .side:nth-child(1)::before {
            content: "";
            position: absolute;
            top: 35px;
            left: 100px;
            width: 100px;
            height: 80px;
            background: #87CEEB;
            border-radius: 12px;
            border: 4px solid #f0e0b0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            transition: background 0.4s;
        }

        /* باب */
        .floor.one .side:nth-child(1)::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 115px;
            width: 70px;
            height: 90px;
            background: #a5673f;
            border-radius: 8px 8px 0 0;
            border: 2px solid #7a4a2a;
        }

        /* عنصر الشمس/القمر */
        .moon-sun {
            position: absolute;
            top: -80px;
            left: -80px;
            width: 70px;
            height: 70px;
            background: #ffdd88;
            border-radius: 50%;
            box-shadow: 0 0 35px #ffcc66;
            transition: all 0.5s ease;
            transform: translateZ(100px);
            z-index: 10;
        }

        /* الصبار والزهور (أشكال CSS بسيطة) */
        .cactus {
            display: block;
            width: 20px;
            height: 40px;
            background: #2d6a2d;
            position: relative;
            border-radius: 10px;
            margin: 20px auto;
        }
        .cactus::before, .cactus::after {
            content: "";
            position: absolute;
            width: 14px;
            height: 28px;
            background: #2d6a2d;
            border-radius: 8px;
            top: 5px;
        }
        .cactus::before { left: -10px; transform: rotate(-20deg); }
        .cactus::after { right: -10px; transform: rotate(20deg); }

        .flowers {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #ff69b4;
            border-radius: 50%;
            box-shadow: 14px 0 #ffb6c1, -14px 0 #ffb6c1, 0 14px #ffb6c1, 0 -14px #ffb6c1;
            margin: 15px;
        }

        /* وضع الليل والنهار باستخدام checkbox */
        #day-night {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 30px;
            appearance: none;
            background: #f0c674;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
            border: 2px solid white;
        }
        #day-night:checked {
            background: #2c3e66;
        }
        #day-night::before {
            content: "☀️";
            position: absolute;
            top: 2px;
            left: 5px;
            font-size: 20px;
            transition: 0.3s;
        }
        #day-night:checked::before {
            content: "🌙";
            left: 32px;
        }
        label {
            position: fixed;
            bottom: 15px;
            right: 95px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        /* تأثيرات التبديل بين النهار والليل */
        body:has(#day-night:checked) {
            background: #0a1f2e;
        }
        body:has(#day-night:checked) .moon-sun {
            background: #f5f0c0;
            box-shadow: 0 0 20px #fff0aa;
            transform: translateZ(100px) scale(0.9);
        }
        body:has(#day-night:checked) .side {
            filter: brightness(0.6) saturate(0.8);
        }
        body:has(#day-night:checked) .floor.one .side:nth-child(1)::before {
            background: #2c3e50;
            box-shadow: inset 0 0 15px #ffdd99;
        }
        body:has(#day-night:checked) .cactus, 
        body:has(#day-night:checked) .cactus::before,
        body:has(#day-night:checked) .cactus::after {
            background: #1e3a1e;
        }
        body:has(#day-night:checked) .flowers {
            background: #aa4c7a;
            box-shadow: 14px 0 #aa6c8c, -14px 0 #aa6c8c, 0 14px #aa6c8c, 0 -14px #aa6c8c;
        }

        /* عناصر إضافية لتزيين الغرفة */
        .floor.two {
            position: absolute;
            top: -20px;
            left: -80px;
            width: 160px;
            height: 160px;
            transform-style: preserve-3d;
            transform: translateZ(70px);
        }
        .floor.two .side {
            background: transparent;
            border: none;
            box-shadow: none;
        }
        .floor.two span i {
            display: inline-block;
        }
    </style>
</head>
<body>
    <input type="checkbox" id="day-night">
    <label for="day-night">🌓 Day/Night</label>

    <div class="scene">
        <div class="content">
            <div class="moon-sun"></div>

            <!-- الطابق الأرضي -->
            <div class="cuboid floor one">
                <div class="side"></div>
                <div class="side"></div>
                <div class="side"></div>
                <div class="side"></div>
                <div class="side"></div>
                <div class="side"></div>
            </div>

            <!-- السقف (الطابق العلوي) -->
            <div class="cuboid roof one">
                <div class="side"><i class="cactus"></i></div>
                <div class="side"></div>
                <div class="side"></div>
                <div class="side"></div>
                <div class="side"></div>
                <div class="side"></div>
            </div>

            <!-- زهور إضافية داخل الغرفة -->
            <div class="cuboid floor two">
                <div class="side"><span><i class="flowers"></i></span></div>
                <div class="side"></div>
                <div class="side"><span></span></div>
                <div class="side"></div>
                <div class="side"></div>
                <div class="side"></div>
            </div>
        </div>
    </div>

    <script>
        // إضافة تفاعل بسيط: تدوير المشهد قليلاً مع حركة الماوس (اختياري، خفيف)
        const sceneContent = document.querySelector('.content');
        let mouseX = 0, mouseY = 0;
        let targetRotX = -15, targetRotY = 25;

        document.addEventListener('mousemove', (e) => {
            const xPercent = (e.clientX / window.innerWidth) - 0.5;
            const yPercent = (e.clientY / window.innerHeight) - 0.5;
            targetRotY = 25 + (xPercent * 10);
            targetRotX = -15 + (yPercent * 6);
            sceneContent.style.transform = `rotateX(${targetRotX}deg) rotateY(${targetRotY}deg) translateZ(50px)`;
        });

        // تحسين الإضاءة التلقائية للوضع الليلي
        const checkbox = document.getElementById('day-night');
        const body = document.body;
        // تطبيق تغيير أولي حسب إعدادات المتصفح
        if (checkbox.checked) {
            body.style.background = "#0a1f2e";
        } else {
            body.style.background = "#2c3e2f";
        }
    </script>
</body>
</html>
